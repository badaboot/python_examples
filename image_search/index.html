<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CLIP Image Search</title>
    <link href="/static/style.css" rel="stylesheet" />
  </head>
  <body>
    <h1>CLIP Image Search</h1>
    <p class="subtitle">Semantic search across your image library</p>

    <div class="search-box">
      <div class="row">
        <div style="position: relative; flex: 1">
          <input
            id="query"
            type="text"
            placeholder='Query  e.g. "mongol warrior armor"'
            style="width: 100%; padding-right: 36px"
          />
          <button
            onclick="clearQuery()"
            style="
              position: absolute;
              right: 8px;
              top: 50%;
              transform: translateY(-50%);
              background: none;
              border: none;
              color: #555;
              font-size: 1.1rem;
              cursor: pointer;
              padding: 0;
              line-height: 1;
            "
            title="Clear"
          >
            ✕
          </button>
        </div>
        <select id="topk">
          <option value="3">Top 3</option>
          <option value="5" selected>Top 5</option>
          <option value="10">Top 10</option>
        </select>
        <button id="searchBtn" onclick="runSearch()">Search</button>
      </div>
    </div>

    <div class="status" id="status"></div>
    <div class="results" id="results"></div>

    <script src="/static/script.js"></script>
  </body>
</html>
